services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lexora-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/app/data/lexora.db
      - OLLAMA_URL=http://host.docker.internal:11434
    volumes:
      - sqlite-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: lexora-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite-data:
